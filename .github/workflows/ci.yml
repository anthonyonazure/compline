name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Test
        run: pytest -q

  install-smoke:
    name: install smoke (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: pip install
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: CLI smoke
        run: |
          compline --version
          compline --help
          # init + ingest + chart all work offline (no API key required)
          compline --db /tmp/compline-ci.db init
          compline --db /tmp/compline-ci.db ingest examples/federalist/papers --corpus federalist
          compline --db /tmp/compline-ci.db chart Hamilton --output /tmp/chart.svg
          test -s /tmp/chart.svg
          echo "ok"
